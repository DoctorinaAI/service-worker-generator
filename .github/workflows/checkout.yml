name: Checkout

on:
  workflow_dispatch:
    inputs:
      dart-version:
        description: "Dart SDK version to use"
        default: "stable"
        required: false
  push:
    branches:
      - "main"
      - "master"
    paths:
      - "bin/**.dart"
      - "lib/**.dart"
      - "lib/src/assets/**"
      - "test/**.dart"
      - "packages/sw/src/**"
      - "scripts/**"
      - ".github/workflows/*.yml"
      - "pubspec.yaml"
      - "package.json"
      - "analysis_options.yaml"
  pull_request:
    branches:
      - "main"
      - "master"
      - "dev"
      - "develop"
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"
      - "support/**"
    paths:
      - "bin/**.dart"
      - "lib/**.dart"
      - "lib/src/assets/**"
      - "test/**.dart"
      - "packages/sw/src/**"
      - "scripts/**"
      - ".github/workflows/*.yml"
      - "pubspec.yaml"
      - "package.json"
      - "analysis_options.yaml"

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: "TypeScript"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Type check
        run: npm run check

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build artifacts and sync generated Dart assets
        run: npm run build:all

      - name: ✅ Verify committed assets match build output
        run: |
          npm run verify
          git diff --exit-code -- lib/src/assets/sw_template.dart lib/src/assets/bootstrap_template.dart

  checkout:
    name: "Dart"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    container:
      image: dart:${{ github.event.inputs.dart-version || 'stable' }}
    env:
      pub-cache: pub
      PUB_CACHE: /github/home/.pub-cache
    timeout-minutes: 10
    outputs:
      version: ${{ steps.setup.outputs.version }}
    concurrency:
      group: checkout-${{ github.workflow }}-${{ github.ref_name }}
      cancel-in-progress: true
    permissions:
      contents: read
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github/

      - name: 🚂 Setup dependencies
        id: setup
        timeout-minutes: 5
        uses: ./.github/actions/setup
        with:
          pub-cache: packages

      - name: 🚦 Check code format
        id: check-format
        timeout-minutes: 1
        run: |
          find bin lib test -name "*.dart" ! -name "*.*.dart" -print0 | xargs -0 dart format --set-exit-if-changed --line-length 80 -o none bin/ lib/ test/

      - name: 📈 Check analyzer
        id: check-analyzer
        timeout-minutes: 1
        run: dart analyze --fatal-warnings lib/ test/

      - name: 🧪 Run unit tests
        id: run-unit-tests
        timeout-minutes: 5
        run: |
          dart test --color --platform=vm --concurrency=12 \
            --timeout=60s --reporter=github --file-reporter=json:reports/tests.json \
            --exclude-tags=integration \
            --coverage=coverage

  e2e:
    name: "E2E (Flutter + Playwright)"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript]
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 📥 Install Node dependencies
        run: npm ci

      - name: 🧱 Build TS artifacts and copy into Dart assets
        run: npm run build:all

      - name: 🐦 Install Flutter example dependencies
        working-directory: example
        run: flutter pub get

      - name: 🏗️ Build Flutter example web
        working-directory: example
        run: flutter build web --release -o build/web

      - name: 🧪 Run Dart integration tests
        run: |
          dart pub get
          dart test --color --platform=vm --concurrency=12 \
            --timeout=120s --reporter=github --tags=integration

      - name: 🧰 Run Dart CLI on example build
        run: dart run sw:generate --input=example/build/web

      - name: 🎭 Install Playwright Chromium
        working-directory: packages/sw
        run: npx playwright install --with-deps chromium

      - name: 🧪 Run Playwright E2E
        working-directory: packages/sw
        run: npx playwright test

      - name: 📤 Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/sw/playwright-report
          retention-days: 7
